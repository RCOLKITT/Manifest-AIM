aim: "1.0"

metadata:
  name: go-production
  version: 1.0.0
  description: "Go production code standards and best practices"
  tags: [go, golang, backend, production]
  license: MIT

context:
  persona: "Senior Go developer building production-grade services"
  domain: software-engineering
  environment: production

governance:
  rules:
    # ── Error Handling ──

    - name: check-error-returns
      description: "All error returns must be checked"
      category: quality
      enforcement: static
      detect:
        type: pattern
        match: "\\w+,\\s*_\\s*:?=.*\\(|_\\s*=.*err"
        file_types: [go]
      action: warn
      severity: warning
      message: "Ignoring error return. Always handle errors explicitly."
      fix_hint: "Handle the error or use an explicit comment explaining why it's safe to ignore"

    - name: no-panic-in-library
      description: "Libraries should not panic"
      category: quality
      enforcement: static
      detect:
        type: pattern
        match: "\\bpanic\\("
        file_types: [go]
      action: warn
      severity: warning
      message: "Avoid panic in library code. Return errors instead."
      fix_hint: "Return an error and let the caller decide how to handle it"

    # ── Security ──

    - name: no-hardcoded-secrets
      description: "No hardcoded secrets"
      category: security
      enforcement: static
      detect:
        type: pattern
        match: "(password|secret|apiKey|token)\\s*[=:]\\s*\"[^\"]{8,}\""
        file_types: [go]
      action: block
      severity: critical
      message: "Hardcoded secret detected."
      fix_hint: "Use environment variables or a secrets manager"

    - name: validate-user-input
      description: "Validate all user input"
      category: security
      enforcement: semantic
      detect:
        type: semantic
        criteria: |
          Check if HTTP handlers validate input:
          - Request body should be validated
          - Path/query parameters should be validated
          - Must reject invalid input with appropriate error
        model: fast
        threshold: 0.8
      action: warn
      severity: warning
      message: "User input may not be validated."

    # ── Concurrency ──

    - name: protect-shared-state
      description: "Shared state must be protected"
      category: quality
      enforcement: semantic
      detect:
        type: semantic
        criteria: |
          Check if shared mutable state is protected:
          - Maps accessed from multiple goroutines need sync.RWMutex or sync.Map
          - Shared variables need atomic operations or mutex
          - Channel operations should handle closed channels
        model: standard
        threshold: 0.8
      action: warn
      severity: warning
      message: "Shared state may not be properly protected."
      fix_hint: "Use sync.Mutex, sync.RWMutex, or channels for synchronization"

    - name: context-propagation
      description: "Context must be propagated"
      category: quality
      enforcement: static
      detect:
        type: pattern
        match: "context\\.Background\\(\\)|context\\.TODO\\(\\)"
        file_types: [go]
      action: warn
      severity: warning
      message: "Prefer propagating context from caller over Background/TODO."
      fix_hint: "Accept context as first parameter and propagate it"

    # ── Logging ──

    - name: structured-logging
      description: "Use structured logging"
      category: quality
      enforcement: static
      detect:
        type: pattern
        match: "fmt\\.Print|log\\.Print"
        file_types: [go]
      action: warn
      severity: warning
      message: "Use structured logging (slog, zap, zerolog) instead of fmt/log."

    # ── Testing ──

    - name: table-driven-tests
      description: "Prefer table-driven tests"
      category: quality
      enforcement: injected
      instruction: |
        Go testing best practices:
        - Use table-driven tests for multiple cases
        - Use t.Parallel() for independent tests
        - Use testify/assert or standard library
        - Name test cases descriptively
        - Test error cases, not just happy paths
      action: log
      severity: info

  quality_gates:
    code:
      require_error_handling: true
      max_complexity: 15
      max_file_length: 500

knowledge:
  - name: go-idioms
    trigger: "writing go code, functions, or interfaces"
    priority: 100
    content: |
      ## Go Idioms

      ### Error Handling
      ```go
      if err != nil {
          return fmt.Errorf("doing something: %w", err)
      }
      ```

      ### Interface Design
      - Accept interfaces, return structs
      - Keep interfaces small (1-3 methods)
      - Define interfaces where they're used

      ### Context
      - First parameter, named ctx
      - Pass down, never store
      - Use for cancellation and deadlines

      ### Naming
      - Short names for short-lived variables (i, j, k)
      - Longer names for longer-lived (userID, requestTimeout)
      - Exported names are CamelCase
      - Unexported are camelCase

  - name: go-project-structure
    trigger: "organizing packages or project structure"
    priority: 90
    content: |
      ## Go Project Structure

      ```
      /cmd
        /myapp          # Main applications
      /internal         # Private code
        /domain         # Business logic
        /handler        # HTTP handlers
        /repository     # Data access
      /pkg              # Public libraries
      /api              # API definitions (OpenAPI, proto)
      ```

      ### Package Design
      - Avoid package names like "util", "common", "shared"
      - Package names are lowercase, single word
      - Avoid circular dependencies
      - One package = one purpose
