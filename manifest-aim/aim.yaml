aim: "1.0"

metadata:
  name: manifest-aim
  version: 0.1.0
  description: "The Agent Instruction Manifest platform — Define it. Manifest it."
  tags: []

context:
  persona: "Senior TypeScript engineer following production best practices"
  domain: software-engineering
  environment: production

governance:
  rules:

    # ── Security ──

    - name: no-eval
      description: "Prevent eval() and similar dynamic execution"
      category: security
      enforcement: static
      exclude_paths: ["**/aim-generator.ts"]  # Generator defines rules, doesn't use eval
      detect:
        type: pattern
        match: "\\beval\\s*\\("
        file_types: [ts, js, tsx, jsx]
      action: block
      severity: critical
      message: "eval() is forbidden. Use safe alternatives."
      fix_hint: "Use JSON.parse() for data, or restructure to avoid dynamic execution"

    - name: no-hardcoded-secrets
      description: "Prevent hardcoded API keys and secrets"
      category: security
      enforcement: static
      detect:
        type: pattern
        match: "(api_key|secret|password|token|private_key)\\s*[=:]\\s*['\"][^'\"]{8,}['\"]"
      action: block
      severity: critical
      message: "Hardcoded secrets detected."
      fix_hint: "Use environment variables or a secrets manager"

    # ── Code Quality ──

    - name: no-console-in-src
      description: "Prevent console.log in production code"
      category: quality
      enforcement: static
      exclude_paths: ["**/tests/**", "**/__tests__/**", "**/test/**", "**/cli/**"]
      detect:
        type: pattern
        match: "console\\.log\\("
      action: warn
      severity: warning
      message: "console.log detected in production code."

    - name: no-empty-catch
      description: "Prevent swallowing errors silently"
      category: quality
      enforcement: static
      detect:
        type: pattern
        match: "catch\\s*\\([^)]*\\)\\s*\\{\\s*\\}"
      action: warn
      severity: warning
      message: "Empty catch block swallows errors."
      fix_hint: "Log the error or add a comment explaining why it's intentional"

    # ── TypeScript ──

    - name: no-any-type
      description: "Minimize use of 'any' type"
      category: quality
      enforcement: static
      detect:
        type: pattern
        match: ":\\s*any\\b"
        file_types: [ts, tsx]
      action: warn
      severity: warning
      message: "Avoid 'any' type — use specific types or 'unknown'."
      fix_hint: "Replace with a proper type, Record<string, unknown>, or unknown"

    - name: no-ts-ignore
      description: "Prevent @ts-ignore without explanation"
      category: quality
      enforcement: static
      detect:
        type: pattern
        match: "@ts-ignore"
        file_types: [ts, tsx]
      action: warn
      severity: warning
      message: "Use @ts-expect-error with explanation instead."

    # ── Semantic (LLM-as-judge) ──

    - name: clean-architecture
      description: "Ensure domain logic is separate from infrastructure"
      category: quality
      enforcement: semantic
      detect:
        type: semantic
        criteria: |
          Check if this code properly separates domain logic from infrastructure:
          - Domain modules should not import from infrastructure, database, or HTTP layers
          - Business logic should not be in route handlers or controllers
          - Use dependency injection for external dependencies
        model: fast
        threshold: 0.85
      action: warn
      severity: warning
      message: "Code may violate clean architecture principles."
      fix_hint: "Move business logic to domain layer, use dependency injection"

    # ── Guidelines (Injected) ──

    - name: platform-standards
      enforcement: injected
      action: log
      instruction: |
        manifest-aim Development Standards:
        - All code must be TypeScript with strict mode
        - No 'any' types without explicit justification
        - Write tests using Vitest
        - Test both success and failure paths
        - Keep functions under 50 lines, files under 400 lines
        - Error messages must be actionable
      severity: info

  # ── Transforms ──
  transforms:
    - name: strip-console-logs
      when: "context.environment == 'production'"
      detect:
        type: pattern
        match: "console\\.log\\([^)]*\\);?\\n?"
      transform:
        type: remove_match

  quality_gates:
    code:
      require_types: strict
      max_complexity: 15
      max_file_length: 400
      require_error_handling: true

knowledge:
  - name: architecture
    trigger: "creating new modules, services, or components"
    priority: 100
    content: |
      ## manifest-aim Architecture

      Directory structure:
      - src/
      - tests/
      API style: rest

  - name: build-and-test
    trigger: "building, testing, or running the project"
    priority: 90
    content: |
      ## Build & Test Commands

      build: tsc
      test: vitest
      test:coverage: vitest --coverage
