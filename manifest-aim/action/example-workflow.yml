# Example: Add AIM governance to your CI/CD pipeline
# Copy this to .github/workflows/aim-enforce.yml

name: AIM Governance

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  enforce:
    name: Enforce AIM Governance
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Enforce AIM manifest
        uses: RCOLKITT/Manifest-AIM/manifest-aim/action@main
        with:
          manifest: aim.yaml
          target: src/
          environment: ${{ github.ref == 'refs/heads/main' && 'production' || 'development' }}
          fail-on-warnings: false
          report: true

  # Optional: enforce different manifests per environment
  enforce-production:
    name: Production Rules
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Enforce production manifest
        uses: RCOLKITT/Manifest-AIM/manifest-aim/action@main
        with:
          manifest: aim.yaml
          target: src/
          environment: production
          fail-on-warnings: true
