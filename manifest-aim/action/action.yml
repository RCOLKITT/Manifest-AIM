name: "Manifest AIM Enforce"
description: "Enforce AIM governance rules against your codebase in CI/CD"
author: "Vaspera Capital"

branding:
  icon: "shield"
  color: "blue"

inputs:
  manifest:
    description: "Path to AIM manifest file"
    required: false
    default: "aim.yaml"
  target:
    description: "File or directory to enforce against"
    required: false
    default: "."
  environment:
    description: "Environment context override (e.g., production, staging)"
    required: false
  fail-on-warnings:
    description: "Exit with failure on warnings (not just blocking violations)"
    required: false
    default: "false"
  report:
    description: "Generate JSON governance report as artifact"
    required: false
    default: "true"
  node-version:
    description: "Node.js version to use"
    required: false
    default: "20"

outputs:
  violations:
    description: "Total number of violations found"
    value: ${{ steps.enforce.outputs.violations }}
  blocked:
    description: "Whether any blocking violations were found"
    value: ${{ steps.enforce.outputs.blocked }}
  report-path:
    description: "Path to the JSON governance report"
    value: ${{ steps.enforce.outputs.report_path }}

runs:
  using: "composite"
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}

    - name: Install Manifest AIM
      shell: bash
      run: |
        npm install -g manifest-aim@latest 2>/dev/null || {
          # If not published yet, install from local path
          if [ -f "${{ github.action_path }}/../package.json" ]; then
            cd "${{ github.action_path }}/.."
            npm ci --production
            npm link
          else
            echo "::error::manifest-aim package not found. Install it first."
            exit 1
          fi
        }

    - name: Validate manifest
      shell: bash
      run: |
        if [ ! -f "${{ inputs.manifest }}" ]; then
          echo "::error::Manifest not found: ${{ inputs.manifest }}"
          echo "::error::Run 'manifest init' to create an aim.yaml"
          exit 1
        fi
        echo "::group::Manifest Validation"
        manifest validate "${{ inputs.manifest }}" || {
          echo "::error::Manifest validation failed"
          exit 1
        }
        echo "::endgroup::"

    - name: Run enforcement
      id: enforce
      shell: bash
      run: |
        ARGS="enforce ${{ inputs.target }} -m ${{ inputs.manifest }}"

        if [ -n "${{ inputs.environment }}" ]; then
          ARGS="$ARGS -e ${{ inputs.environment }}"
        fi

        # Generate report
        REPORT_PATH=""
        if [ "${{ inputs.report }}" = "true" ]; then
          REPORT_PATH="${{ runner.temp }}/aim-governance-report.json"
          manifest $ARGS --report > "$REPORT_PATH" 2>&1
          REPORT_EXIT=$?

          echo "report_path=$REPORT_PATH" >> $GITHUB_OUTPUT

          # Parse report for summary
          if [ -f "$REPORT_PATH" ]; then
            VIOLATIONS=$(cat "$REPORT_PATH" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('summary',{}).get('totalViolations',0))" 2>/dev/null || echo "0")
            BLOCKED=$(cat "$REPORT_PATH" | python3 -c "import sys,json; d=json.load(sys.stdin); print(str(d.get('summary',{}).get('blocked',False)).lower())" 2>/dev/null || echo "false")
          else
            VIOLATIONS=0
            BLOCKED=false
          fi

          echo "violations=$VIOLATIONS" >> $GITHUB_OUTPUT
          echo "blocked=$BLOCKED" >> $GITHUB_OUTPUT
        fi

        # Run human-readable output
        echo "::group::AIM Enforcement Results"
        manifest $ARGS 2>&1
        ENFORCE_EXIT=$?
        echo "::endgroup::"

        # Determine exit code
        if [ $ENFORCE_EXIT -ne 0 ]; then
          echo "::error::Blocking governance violations found. Fix violations and retry."
          exit 1
        fi

        if [ "${{ inputs.fail-on-warnings }}" = "true" ] && [ "$VIOLATIONS" -gt 0 ]; then
          echo "::warning::$VIOLATIONS governance warning(s) found (fail-on-warnings enabled)"
          exit 1
        fi

    - name: Upload governance report
      if: inputs.report == 'true' && always()
      uses: actions/upload-artifact@v4
      with:
        name: aim-governance-report
        path: ${{ runner.temp }}/aim-governance-report.json
        if-no-files-found: ignore

    - name: Add PR comment with results
      if: github.event_name == 'pull_request' && always()
      shell: bash
      run: |
        VIOLATIONS="${{ steps.enforce.outputs.violations }}"
        BLOCKED="${{ steps.enforce.outputs.blocked }}"

        if [ "$BLOCKED" = "true" ]; then
          ICON="❌"
          STATUS="**BLOCKED** — Governance violations must be resolved"
        elif [ "$VIOLATIONS" -gt 0 ]; then
          ICON="⚠️"
          STATUS="**WARNINGS** — $VIOLATIONS governance warning(s)"
        else
          ICON="✅"
          STATUS="**PASSED** — No governance violations"
        fi

        BODY="## $ICON AIM Governance Report

        $STATUS

        | Metric | Value |
        |--------|-------|
        | Manifest | \`${{ inputs.manifest }}\` |
        | Target | \`${{ inputs.target }}\` |
        | Violations | $VIOLATIONS |
        | Blocked | $BLOCKED |

        <details>
        <summary>What is AIM?</summary>

        [Agent Instruction Manifests](https://github.com/RCOLKITT/Manifest-AIM) define governance rules
        for AI agent output. Rules are enforced automatically in CI/CD.
        </details>"

        # Post comment using gh CLI (available in GitHub Actions)
        if command -v gh &>/dev/null; then
          echo "$BODY" | gh pr comment "${{ github.event.pull_request.number }}" --body-file - 2>/dev/null || true
        fi
      env:
        GH_TOKEN: ${{ github.token }}
